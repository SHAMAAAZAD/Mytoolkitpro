<!DOCTYPE html>
<html>
<head>
<title>Firebase Test</title>
</head>
<body>
<h2>Firebase Connection Test</h2>
<div id="log" style="font-family:monospace;font-size:14px;padding:10px"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const log = msg => {
  document.getElementById('log').innerHTML += '<br>' + new Date().toLocaleTimeString() + ' — ' + msg;
  console.log(msg);
};

log('Step 1: Checking Firebase SDK...');
log('firebase defined: ' + (typeof firebase !== 'undefined'));

const config = {
  apiKey:            "AIzaSyDN3Vf-bjrcEk_Ri1BSaa-y1EjiCHnJNXM",
  authDomain:        "mytoolkit-e6525.firebaseapp.com",
  databaseURL:       "https://mytoolkit-e6525-default-rtdb.firebaseio.com",
  projectId:         "mytoolkit-e6525",
  storageBucket:     "mytoolkit-e6525.firebasestorage.app",
  messagingSenderId: "340489741286",
  appId:             "1:340489741286:web:16543643fc75d8cf012c27",
};

try {
  log('Step 2: Initializing Firebase...');
  let app;
  try { app = firebase.app(); log('Using existing app'); }
  catch(e) { app = firebase.initializeApp(config); log('New app created'); }

  const auth = firebase.auth(app);
  const db   = firebase.database(app);
  log('Step 3: Auth + DB ready');

  auth.onAuthStateChanged(user => {
    if(user) log('✅ AUTH SUCCESS! UID: ' + user.uid);
    else log('Auth state: signed out');
  });

  log('Step 4: Signing in anonymously...');
  auth.signInAnonymously()
    .then(() => {
      log('signInAnonymously() resolved');
      log('Step 5: Writing test data...');
      return db.ref('test/connection').set({
        time: new Date().toISOString(),
        status: 'connected'
      });
    })
    .then(() => log('✅ WRITE SUCCESS! Firebase fully working!'))
    .catch(e => log('❌ ERROR: ' + e.code + ' — ' + e.message));

} catch(e) {
  log('❌ CRASH: ' + e.message);
}
</script>
</body>
</html>
